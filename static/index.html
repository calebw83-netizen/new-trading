<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#126c5a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Trade Radar" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Robinhood Trading Bridge</title>
    <link rel="manifest" href="/static/manifest.webmanifest?v=1" />
    <link rel="apple-touch-icon" href="/static/icon.svg?v=1" />
    <link rel="stylesheet" href="/static/styles.css?v=12" />
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div>
          <h1>Robinhood Trading Bridge</h1>
          <p id="statusLine">Checking connection...</p>
        </div>
        <div class="status-pills" id="statusPills"></div>
      </section>

      <section class="grid">
        <article class="panel strategy-panel">
          <div class="panel-head">
            <h2>Challenge Radar</h2>
            <div class="panel-actions">
              <button id="autoScan" type="button">Auto Scan</button>
              <button id="autoExecute" type="button" class="danger">Auto Execute 80+</button>
              <span class="challenge-target">$10 to $1000 / 90 days</span>
            </div>
          </div>
          <div class="strategy-result">
            <div id="strategyOutput" class="decision empty">Autopilot waiting.</div>
          </div>
        </article>

        <article class="panel account-panel">
          <div class="panel-head">
            <h2>Account</h2>
            <button id="refreshAccounts" type="button">Refresh</button>
          </div>
          <pre id="accountsOutput" class="output">No account data loaded yet.</pre>
        </article>

        <article class="panel proposal-panel">
          <div class="panel-head">
            <h2>Trade Decision</h2>
          </div>
          <div id="proposalOutput" class="decision empty">No proposal checked yet.</div>
        </article>

        <article class="panel execution-panel">
          <div class="panel-head">
            <h2>Execution</h2>
          </div>
          <pre id="orderOutput" class="output">No automatic execution yet.</pre>
        </article>

        <article class="panel audit-panel">
          <div class="panel-head">
            <h2>Audit Trail</h2>
            <button id="refreshAudit" type="button">Refresh</button>
          </div>
          <div id="auditOutput" class="audit-list">No audit events loaded yet.</div>
        </article>
      </section>
    </main>

    <script src="/static/app.js?v=12"></script>
  </body>
</html>
